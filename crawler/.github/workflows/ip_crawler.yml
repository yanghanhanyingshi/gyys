name: IP Crawler

on:
  schedule:
    # 每12小时运行一次 (UTC时间)
    - cron: '0 */12 * * *'
  workflow_dispatch:
    # 允许手动触发

jobs:
  crawl:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r crawler/requirements.txt
    
    - name: 运行爬虫
      working-directory: ./crawler
      run: python crawler.py
    
    - name: 提交并推送结果
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add crawler/valid_ips.txt crawler/valid_ips_pure.txt crawler/valid_ips.json
        git diff --staged --quiet || git commit -m "更新IP列表 - $(date '+%Y-%m-%d %H:%M:%S')"
        git push
