name: 节点采集
on:
  push:
    branches: [ main, master ]
  schedule:
    - cron: '0 8 * * *'  # 每日早8点自动运行
  workflow_dispatch: # 支持手动点击运行

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 配置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖库
        run: |
          pip install requests pybase64 --upgrade

      - name: 执行订阅合并脚本
        run: python sub_merge.py

      - name: 上传生成文件产物
        uses: actions/upload-artifact@v4
        with:
          name: proxy-config-files
          path: output/

      - name: 提交更新文件到仓库
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add output/
          git commit -m "Auto update proxy config files" || echo "无文件更新跳过提交"
          git push
