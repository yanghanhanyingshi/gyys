name: CF IP Optimizer Auto Run
on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 配置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp

      - name: 执行优选IP脚本
        run: python cf_optimizer.py

      - name: 提交运行结果文件
        run: |
          git config --global user.name "Github Actions"
          git config --global user.email "actions@github.com"
          git add proxy_ip.txt premium_proxy.txt reserve_ips.txt entry_ip_*.txt cf_optimizer.log
          git commit -m "自动定时更新IP列表 - 每2小时任务" || echo "无文件更新，跳过提交"
          git push

